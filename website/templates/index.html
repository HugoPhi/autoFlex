<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoFlex Workflow Platform</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1>AutoFlex Workflow Platform</h1>
        <p>源码上传 -> 迁移 -> 构建测试搜索 -> 产物下载</p>
      </header>

      <section class="layout">
        <aside class="left-panel">
          <div class="card">
            <h2>Stage A: Code Porting（代码迁移）</h2>
            <div class="field">
              <label for="wf-porting-zip">source_zip（源码压缩包）</label>
              <input id="wf-porting-zip" type="file" accept=".zip" />
            </div>
            <button id="wf-porting-submit" class="btn">开始迁移</button>
          </div>

          <div class="card">
            <h2>Stage B: Config Search（配置搜索）</h2>
            <div class="field">
              <label for="wf-search-zip">source_zip（迁移后源码包）</label>
              <input id="wf-search-zip" type="file" accept=".zip" />
            </div>
            <div class="field">
              <label for="wf-search-app">app（目标应用）</label>
              <select id="wf-search-app">
                <option value="nginx">nginx</option>
                <option value="redis">redis</option>
              </select>
            </div>
            <div class="field two-col">
              <div>
                <label for="wf-search-baseline-metric">baseline_metric（基线指标）</label>
                <input id="wf-search-baseline-metric" type="text" value="REQ" />
              </div>
              <div>
                <label for="wf-search-baseline-threshold">baseline_threshold（基线阈值）</label>
                <input id="wf-search-baseline-threshold" type="text" value="45000" />
              </div>
            </div>
            <div class="field two-col">
              <div>
                <label for="wf-search-num-comp">num_compartments（隔离域数量）</label>
                <input id="wf-search-num-comp" type="text" value="3" />
              </div>
              <div>
                <label for="wf-search-top-k">top_k（输出候选数量）</label>
                <input id="wf-search-top-k" type="text" value="3" />
              </div>
            </div>
            <div class="field two-col">
              <div>
                <label for="wf-search-host-cores">host_cores（主机核绑定）</label>
                <input id="wf-search-host-cores" type="text" value="3,4" />
              </div>
              <div>
                <label for="wf-search-wayfinder-cores">wayfinder_cores（搜索核绑定）</label>
                <input id="wf-search-wayfinder-cores" type="text" value="1,2" />
              </div>
            </div>
            <div class="field two-col">
              <div>
                <label for="wf-search-test-iterations">test_iterations（测试轮次）</label>
                <input id="wf-search-test-iterations" type="text" value="3" />
              </div>
              <div>
                <label for="wf-search-overlay-subdir">overlay_subdir（压缩包子目录）</label>
                <input id="wf-search-overlay-subdir" type="text" placeholder="可留空" />
              </div>
            </div>
            <p class="hint">sudo 已固定启用，不再提供页面开关。</p>
            <button id="wf-search-submit" class="btn">开始搜索</button>
          </div>
        </aside>

        <section class="viewer-panel">
          <div class="card">
            <div class="viewer-head">
              <h2>View 作业（重点面板）</h2>
              <button id="refresh-jobs" class="btn secondary">刷新</button>
            </div>
            <div id="jobs-table" class="jobs-table"></div>
          </div>

          <div class="card">
            <h3>作业详情（含参数）</h3>
            <div id="job-meta" class="meta-box">请选择作业</div>
          </div>

          <div class="card log-card">
            <h3>实时日志（可滚动 / 长驻）</h3>
            <pre id="job-log" class="log-box">请选择作业</pre>
          </div>

          <div class="card">
            <h3>产物下载</h3>
            <div id="job-artifacts" class="artifacts-box"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
